# nginx config for fia.your-domain.com
# Copy to VPS: /etc/nginx/sites-enabled/fia
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl;
    server_name fia.your-domain.com;

    # SSL certs (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/fia.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fia.your-domain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to FiaOS on Mac Mini via SSH tunnel (port 9000)
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for voice and terminal
    location /voice {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /api/terminal {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}

server {
    listen 80;
    server_name fia.your-domain.com;
    return 301 https://$host$request_uri;
}
